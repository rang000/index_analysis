name: push-test
run-name: push action by @${{ github.actor }}
on: push
env: 
  FORMAT_FUNC: ${{format('{0}, {1}.', 'Hi', 'world')}}
  VARS_JSON: ${{toJSON(vars)}}

defaults:                                         # デフォルトシェル
  run:
    shell: bash
concurrency:                                      # 自動キャンセル
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs: 
  summary-report:
    runs-on: ubuntu-latest
    environment: test
    env: 
      USERNAME: ${{vars.USERNAME}}
    timeout-minutes: 3
    steps:
      - name: show group log
        run: |
          echo "${USERNAME}" # test environment
          pwd
          echo "::group::Show envs"
          printenv
          echo "::endgroup::"
          echo "::debug:: this is debug comment"
      - name: show annotation
        run: |
          echo "::error::This is an error."
          echo "::warning::This is an warning."
          echo "::notice::This is an notice."
      - name: create job summary
        run: |
          echo "# さまり :rocket:" >> "${GITHUB_STEP_SUMMARY}"
          echo "- first itme">> "${GITHUB_STEP_SUMMARY}"
          echo "- second itme">> "${GITHUB_STEP_SUMMARY}"
  generate-func:
    runs-on: ubuntu-latest
    needs: [summary-report]
    steps:
