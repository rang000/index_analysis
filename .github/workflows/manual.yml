name: manual
on: 
    workflow_dispatch:
        inputs:
            greeting:
                type: string
                default: what's up
                required: true
                description: a cheerful word
            choice:
                type: choice
                options:
                    - info
                    - warn
                    - error
                required: false
jobs:
    manual-run:
        runs-on: ubuntu-latest
        env: 
            BRANCH: feature-gh-actions
        steps:
            - run: echo "${{inputs.greeting}}"
            - run: ls
            - run: pwd
            - run: 'echo "actor: ${{github.actor}}, tmp_path: ${{runner.temp}}"'
            - run: echo "${{BRANCH}}"
            - uses: actions/checkout@v4
              with: 
                ref: ${{env.BRANCH}}

